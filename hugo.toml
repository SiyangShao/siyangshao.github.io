[params]
  description = 'Ph.D. student in Computer Science at Georgia Tech'
  footer = '&copy; Siyang Shao {Year} | Powered by [Hugo](https://gohugo.io)'

[markup]
  [markup.highlight]
    codeFences = false

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        block = [["\\[", "\\]"], ["$$", "$$"]]
        inline = [["\\(", "\\)"]]
