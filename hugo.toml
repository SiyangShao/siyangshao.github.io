baseURL = 'https://siyangshao.github.io/'
languageCode = 'en-us'
title = 'Siyang Shao'
theme = 'hugo-xmin'
# googleAnalytics = ''
disqusShortname = ''
footnotereturnlinkcontents = '&#8617;'
ignoreFiles = ['\\.Rmd$', '\\.Rmarkdown$', '_cache$']

enableRobotsTXT = true

[permalinks]
  note = '/note/:year/:month/:day/:slug/'
  post = '/post/:year/:month/:day/:slug/'

